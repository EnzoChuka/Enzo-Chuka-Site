  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: rgba(255,255,255,0.7); margin: 0 0 12px\">Site, Google e identidade organizada — as três frentes que fazem o cliente confiar e escolher você.<\u002Fp>\n        <a href=\"#servicos\" style=\"font-size: 14px; font-weight: 600; color: #fff; border-bottom: 1px solid #1D6AE5; padding-bottom: 2px\" style-hover=\"color: #6FA3F2\">ver serviços →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"5\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #6FA3F2; margin-bottom: 12px\">{ me siga }<\u002Fdiv>\n        <a href=\"https://instagram.com/enzochuka\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 15px; font-weight: 600; color: #fff\" style-hover=\"color: #6FA3F2\">@enzochuka<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <!-- marquee de tags -->\n  <div style=\"border-top: 1px solid rgba(255,255,255,0.1); overflow: hidden; padding: 16px 0; position: relative; background: rgba(255,255,255,0.02)\">\n    <div style=\"display: flex; width: max-content; animation: ec-marquee 30s linear infinite\">\n      <div style=\"display: flex; gap: 60px; padding-right: 60px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.45); white-space: nowrap\">\n        <span>{ site }<\u002Fspan><span>{ google }<\u002Fspan><span>{ identidade }<\u002Fspan><span>{ presença digital }<\u002Fspan><span>{ pequenos negócios }<\u002Fspan><span>{ site }<\u002Fspan><span>{ google }<\u002Fspan><span>{ identidade }<\u002Fspan><span>{ presença digital }<\u002Fspan><span>{ pequenos negócios }<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 60px; padding-right: 60px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.45); white-space: nowrap\">\n        <span>{ site }<\u002Fspan><span>{ google }<\u002Fspan><span>{ identidade }<\u002Fspan><span>{ presença digital }<\u002Fspan><span>{ pequenos negócios }<\u002Fspan><span>{ site }<\u002Fspan><span>{ google }<\u002Fspan><span>{ identidade }<\u002Fspan><span>{ presença digital }<\u002Fspan><span>{ pequenos negócios }<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ══════════ A MARCA (gelo) ══════════ -->\n<section id=\"marca\" data-screen-label=\"A marca\" style=\"background: #F2F5F8\">\n  <div style=\"max-width: 1280px; margin: 0 auto; padding: 120px 40px\">\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-bottom: 72px\">\n      <div>\n        <div data-reveal=\"1\" style=\"font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #1D6AE5; margin-bottom: 20px\">{ a marca }<\u002Fdiv>\n        <h2 data-reveal=\"2\" style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: clamp(2.2rem, 3.8vw, 3.25rem); letter-spacing: -0.02em; line-height: 1.08; margin: 0\">Todo negócio bom merece ser <span style=\"color: #1D6AE5\">encontrado.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"align-self: end\">\n        <p data-reveal=\"3\" style=\"font-size: 19px; line-height: 1.65; color: #5A6B7F; margin: 0 0 18px\">Muita gente boa no que faz continua invisível na internet — ou aparece de um jeito que não passa confiança. Antes de comprar, as pessoas pesquisam. O que elas encontram decide se ligam para você ou para o concorrente.<\u002Fp>\n        <p data-reveal=\"4\" style=\"font-size: 19px; line-height: 1.65; color: #5A6B7F; margin: 0\">Meu trabalho é fazer essa primeira impressão jogar a seu favor: uma presença online clara, organizada e profissional.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px\">\n      <div data-reveal=\"1\" style=\"background: #FFFFFF; border: 1px solid rgba(14,42,71,0.06); border-radius: 12px; padding: 40px 34px; transition: transform .25s ease, box-shadow .25s ease\" style-hover=\"transform: translateY(-6px); box-shadow: 0 8px 24px rgba(14,42,71,0.10)\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #1D6AE5; margin-bottom: 16px\">{ confiável }<\u002Fdiv>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #0E2A47; margin: 0; font-weight: 500\">Você sabe o que vai receber, quanto custa e quando fica pronto. Sem surpresa no meio do caminho.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"2\" style=\"background: #FFFFFF; border: 1px solid rgba(14,42,71,0.06); border-radius: 12px; padding: 40px 34px; transition: transform .25s ease, box-shadow .25s ease\" style-hover=\"transform: translateY(-6px); box-shadow: 0 8px 24px rgba(14,42,71,0.10)\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #1D6AE5; margin-bottom: 16px\">{ organizado }<\u002Fdiv>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #0E2A47; margin: 0; font-weight: 500\">Sua marca com a mesma cara em todo lugar: site, Google e redes. Tudo alinhado, nada solto.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"3\" style=\"background: #FFFFFF; border: 1px solid rgba(14,42,71,0.06); border-radius: 12px; padding: 40px 34px; transition: transform .25s ease, box-shadow .25s ease\" style-hover=\"transform: translateY(-6px); box-shadow: 0 8px 24px rgba(14,42,71,0.10)\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #1D6AE5; margin-bottom: 16px\">{ profissional }<\u002Fdiv>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #0E2A47; margin: 0; font-weight: 500\">Design limpo e direto, que transmite a seriedade que o seu trabalho merece.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ SERVIÇOS (marinho) ══════════ -->\n<section id=\"servicos\" data-screen-label=\"Serviços\" style=\"background: #0E2A47; color: #fff\">\n  <div style=\"max-width: 1280px; margin: 0 auto; padding: 120px 40px\">\n    <div data-reveal=\"1\" style=\"font-family: 'JetBrains Mono', monospace; font-size: : #1D6AE5; transition: transform .35s ease; transform: {{ f.iconTransform }}; flex-shrink: 0\">+<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"display: grid; grid-template-rows: {{ f.rows }}; transition: grid-template-rows .4s ease\">\n            <div style=\"min-height: 0; overflow: hidden\">\n              <p style=\"font-size: 16px; line-height: 1.65; color: #5A6B7F; margin: 0; padding: 0 28px 26px\">{{ f.resposta }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ CTA FINAL / CONTATO (marinho profundo) ══════════ -->\n<section id=\"contato\" data-screen-label=\"Contato\" style=\"background: #0A1F36; color: #fff\">\n  <div style=\"max-width: 1280px; margin: 0 auto; padding: 120px 40px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start\">\n    <div>\n      <div data-reveal=\"1\" style=\"font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #6FA3F2; margin-bottom: 20px\">{ vamos começar }<\u002Fdiv>\n      <h2 data-reveal=\"2\" style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: clamp(2.4rem, 4.2vw, 3.75rem); letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 24px; color: #fff\">Bora tirar sua ideia do papel?<\u002Fh2>\n      <p data-reveal=\"3\" style=\"font-size: 19px; line-height: 1.65; color: rgba(255,255,255,0.75); max-width: 440px; margin: 0 0 44px\">Me chama no direct ou preenche o formulário. A primeira conversa é sem compromisso — você sai dela com clareza, mesmo que a gente não feche.<\u002Fp>\n      <div data-reveal=\"4\" style=\"display: flex; gap: 14px; flex-wrap: wrap\">\n        <a href=\"https://instagram.com/enzochuka\" target=\"_blank\" rel=\"noopener\" style=\"background: #1D6AE5; color: #fff; padding: 15px 28px; border-radius: 12px; font-weight: 600; font-size: 16px; transition: transform .2s ease, box-shadow .2s ease\" style-hover=\"color: # y: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.4)\">{ ec } — Enzo Chuka<\u002Fdiv>\n      <div style=\"font-size: 14px; color: rgba(255,255,255,0.4)\">Presença digital para pequenos negócios · Brasil<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"height: 4px; background: #1D6AE5\"><\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;whatsapp&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;11992465824&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contato&quot;,&quot;description&quot;:&quot;Número com DDD e código do país (ex: 5511999999999). Vazio esconde o botão de WhatsApp.&quot;},&quot;velocidadeAnimacao&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.75,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.25,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Animação&quot;,&quot;description&quot;:&quot;Velocidade das animações de entrada (maior = mais rápido).&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    openFaq: -1,\n    formEnviado: false,\n    formNome: '',\n    formNegocio: '',\n    formIdeia: ''\n  };\n\n  componentDidMount() {\n    this._initHeroVideo();\n    const speed = this.props.velocidadeAnimacao ?? 0.75;\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    const show = (el) => {\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n    };\n    const hide = (el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n    };\n    els.forEach((el) => {\n      const order = parseInt(el.getAttribute('data-reveal'), 10) || 1;\n      el.style.transition = `opacity ${0.7 / speed}s ease ${(order - 1) * 0.12 / speed}s, transform ${0.7 / speed}s cubic-bezier(0.22, 1, 0.36, 1) ${(order - 1) * 0.12 / speed}s`;\n      hide(el);\n    });\n    // Scroll-driven reveal (replayable): measured directly via getBoundingClientRect,\n    // never trusting IntersectionObserver entry data (unreliable in embedded contexts).\n    const update = () => {\n      this._ticking = false;\n      const vh = window.innerHeight;\n      els.forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.width === 0 && r.height === 0) return; // not laid out yet\n        if (r.top < vh - 30 && r.bottom > 0) show(el);\n        else if (r.top >= vh) hide(el); // re-arm below the fold → replays on next pass\n      });\n      // Vídeo do hero: mesma lógica dos reveals — toca ao entrar em vista, re-arma abaixo da dobra\n      const cv = this._heroCanvas;\n      if (cv) {\n        const r = cv.getBoundingClientRect();\n        if (r.width || r.height) {\n          if (r.top < vh - 30 && r.bottom > 0) {\n            if (!this._vidPlayed) { this._vidPlayed = true; this._playHeroVideo(); }\n          } else if (r.top >= vh || r.bottom <= 0) {\n            // re-arma ao sair de vista (para cima ou para baixo) → toca de novo ao voltar\n            this._vidPlayed = false;\n            cancelAnimationFrame(this._vidRaf);\n            this._drawHeroFrame(0);\n          }\n        }\n      }\n    };\n    const schedule = () => {\n      if (this._ticking) return;\n      this._ticking = true;\n      requestAnimationFrame(update);\n    };\n    this._schedule = schedule;\n    // capture:true catches scrolls of window OR any scrolling container\n    document.addEventListener('scroll', schedule, true);\n    window.addEventListener('resize', schedule, { passive: true });\n    // IO used only as an extra trigger to re-measure — its entries are ignored\n    this._io = new IntersectionObserver(schedule, { threshold: [0, 0.12, 0.5] });\n    els.forEach((el) => this._io.observe(el));\n    // Initial reveal of everything in view\n    requestAnimationFrame(() => requestAnimationFrame(update));\n    // Fail-safe re-measures\n    this._revealTimer = setTimeout(update, 1200);\n    this._revealTimer2 = setTimeout(update, 3000);\n  }\n\n  // ── Vídeo do hero: decodifica os frames, remove o fundo preto (flood fill\n  //    a partir das bordas) e reproduz uma vez num canvas, congelando no último frame.\n  async _initHeroVideo() {\n    try {\n      const v = document.createElement('video');\n      v.src = 'images/enzo-video.mp4';\n      v.muted = true; v.playsInline = true; v.preload = 'auto';\n      await new Promise((res, rej) => { v.onloadedmetadata = res; v.onerror = rej; });\n      const W = v.videoWidth, H = v.videoHeight;\n      const cv = this._heroCanvas;\n      if (!cv || !W || !H) return;\n      cv.width = W; cv.height = H;\n      const off = document.createElement('canvas');\n      off.width = W; off.height = H;\n      const octx = off.getContext('2d', { willReadFrequently: true });\n      const fps = 30;\n      const n = Math.max(2, Math.round(v.duration * fps));\n      const frames = [];\n      for (let i = 0; i < n; i++) {\n        const t = Math.min(i / fps, Math.max(0, v.duration - 0.02));\n        await new Promise((res) => { v.onseeked = res; v.currentTime = t; });\n        octx.drawImage(v, 0, 0);\n        const im = octx.getImageData(0, 0, W, H);\n        this._keyOutBlack(im, W, H);\n        octx.putImageData(im, 0, 0);\n        frames.push(await createImageBitmap(off));\n      }\n      this._vidFrames = frames;\n      this._vidFps = fps;\n      this._drawHeroFrame(0);\n      if (this._vidPending) { this._vidPending = false; this._playHeroVideo(); }\n    } catch (e) { /* processamento do vídeo falhou — canvas fica vazio */ }\n  }\n\n  _keyOutBlack(im, W, H) {\n    const d = im.data, N = W * H;\n    const bg = new Uint8Array(N);\n    const stack = [];\n    const thr = 16; // soma r+g+b considerada \"preto de fundo\"\n    const isDark = (i) => (d[i * 4] + d[i * 4 + 1] + d[i * 4 + 2]) < thr;\n    const push = (i) => { if (!bg[i] && isDark(i)) { bg[i] = 1; stack.push(i); } };\n    for (let x = 0; x < W; x++) { push(x); push((H - 1) * W + x); }\n    for (let y = 0; y < H; y++) { push(y * W); push(y * W + W - 1); }\n    while (stack.length) {\n      const i = stack.pop(), x = i % W, y = (i / W) | 0;\n      if (x > 0) push(i - 1);\n      if (x < W - 1) push(i + 1);\n      if (y > 0) push(i - W);\n      if (y < H - 1) push(i + W);\n    }\n    for (let i = 0; i < N; i++) if (bg[i]) d[i * 4 + 3] = 0;\n    // suaviza a borda: pixels opacos vizinhos do fundo ganham alpha proporcional ao brilho\n    for (let y = 1; y < H - 1; y++) {\n      for (let x = 1; x < W - 1; x++) {\n        const i = y * W + x;\n        if (bg[i]) continue;\n        if (bg[i - 1] || bg[i + 1] || bg[i - W] || bg[i + W]) {\n          const l = d[i * 4] + d[i * 4 + 1] + d[i * 4 + 2];\n          d[i * 4 + 3] = Math.min(255, Math.max(60, l));\n        }\n      }\n    }\n  }\n\n  _playHeroVideo() {\n    if (!this._vidFrames) { this._vidPending = true; return; }\n    cancelAnimationFrame(this._vidRaf);\n    const start = performance.now();\n    const tick = () => {\n      const idx = Math.min(this._vidFrames.length - 1, Math.floor((performance.now() - start) / 1000 * this._vidFps * 0.5));\n      this._drawHeroFrame(idx);\n      if (idx < this._vidFrames.length - 1) this._vidRaf = requestAnimationFrame(tick);\n    };\n    tick();\n  }\n\n  _drawHeroFrame(i) {\n    const cv = this._heroCanvas;\n    const f = this._vidFrames && this._vidFrames[i];\n    if (!cv || !f) return;\n    const ctx = cv.getContext('2d');\n    ctx.clearRect(0, 0, cv.width, cv.height);\n    ctx.drawImage(f, 0, 0);\n    // iluminação azul de baixo para cima, recortada na silhueta\n    ctx.save();\n    ctx.globalCompositeOperation = 'source-atop';\n    const g = ctx.createLinearGradient(0, cv.height, 0, cv.height * 0.2);\n    g.addColorStop(0, 'rgba(47,124,246,0.65)');\n    g.addColorStop(0.45, 'rgba(29,106,229,0.28)');\n    g.addColorStop(1, 'rgba(29,106,229,0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, cv.width, cv.height);\n    ctx.restore();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._vidRaf);\n    if (this._io) this._io.disconnect();\n    if (this._revealTimer) clearTimeout(this._revealTimer);\n    if (this._revealTimer2) clearTimeout(this._revealTimer2);\n    if (this._schedule) {\n      document.removeEventListener('scroll', this._schedule, true);\n      window.removeEventListener('resize', this._schedule);\n    }\n  }\n\n  renderVals() {\n    const heroCanvasRef = (el) => { this._heroCanvas = el; };\n    const whatsapp = (this.props.whatsapp ?? '').replace(/\\D/g, '');\n    const openFaq = this.state.openFaq;\n\n    const faqsData = [\n      { pergunta: 'Quanto custa um site?', resposta: 'Depende do tamanho do projeto. Depois da primeira conversa, você recebe uma proposta clara, com valor fechado e sem surpresas no meio do caminho.' },\n      { pergunta: 'Em quanto tempo fica pronto?', resposta: 'Um site simples costuma ficar pronto em poucas semanas. Antes de começar, a gente combina um prazo — e eu cumpro.' },\n      { pergunta: 'Preciso entender de tecnologia?', resposta: 'Não. Esse é o meu trabalho. A gente conversa em português claro, sem termos complicados, e eu cuido de toda a parte técnica.' },\n      { pergunta: 'Vou aparecer no Google?', resposta: 'O site já sai preparado para o Google encontrar. Também te oriento sobre o que fazer para aparecer quando alguém procurar o seu serviço.' },\n      { pergunta: 'E depois que o site estiver no ar?', resposta: 'Você não fica sozinho. Ofereço acompanhamento de perto para atualizações, ajustes e o que mais o seu negócio precisar.' }\n    ];\n\n    return {\n      heroCanvasRef,\n      servicos: [\n        { num: '{ 01 }', titulo: 'Um site que passa confiança', desc: 'Rápido, bonito no celular e fácil de usar. A vitrine do seu negócio aberta 24 horas por dia.', entregas: ['Páginas essenciais do seu negócio', 'Visual alinhado à sua m
